<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F1EA"/>

  <!-- Subtle inner border -->
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#E0D8CA" stroke-width="1"/>

  <!-- Top accent line (Martini red) -->
  <rect x="0" y="0" width="1200" height="4" fill="#A4312A"/>

  <!-- Club name -->
  <text
    x="600" y="260"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="700"
    text-anchor="middle"
    fill="#1A1A1A"
    letter-spacing="-3"
  >1 of 1</text>

  <!-- Divider -->
  <rect x="520" y="285" width="160" height="1" fill="#E0D8CA"/>

  <!-- Car Club -->
  <text
    x="600" y="340"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="400"
    text-anchor="middle"
    fill="#3D3A36"
    letter-spacing="8"
  >CAR CLUB</text>

  <!-- Tagline -->
  <text
    x="600" y="420"
    font-family="Arial, Helvetica, sans-serif"
    font-size="18"
    font-weight="400"
    text-anchor="middle"
    fill="#706B63"
    letter-spacing="3"
  >CHICAGO  //  DALLAS</text>

  <!-- Bottom note: replace with real photo before launch -->
  <text
    x="600" y="590"
    font-family="'Courier New', monospace"
    font-size="10"
    text-anchor="middle"
    fill="#C4BAA8"
    letter-spacing="1"
  >REPLACE WITH REAL PHOTOGRAPHY BEFORE LAUNCH</text>
</svg>
